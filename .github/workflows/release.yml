name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: chrome-web-store
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Verify tagged commit is on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tagged commit $GITHUB_SHA is not on main; refusing to publish."
            exit 1
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Verify tag matches manifest version
        run: |
          node -e "
            const manifest = require('./manifest.json');
            const tag = process.env.GITHUB_REF_NAME.replace(/^v/, '');
            if (manifest.version !== tag) {
              console.error('Tag ' + tag + ' does not match manifest version ' + manifest.version);
              process.exit(1);
            }
          "
      - run: npm run check
      - run: npm run package
      - name: Keep zip as a build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smooth-surfer-${{ github.ref_name }}
          path: dist/smooth-surfer.zip
      - name: Upload and publish to the Chrome Web Store
        if: ${{ vars.CWS_PUBLISH == 'true' }}
        run: npx chrome-webstore-upload-cli@3.5.0 upload --source dist/smooth-surfer.zip --auto-publish
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
