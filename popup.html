<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smooth Surfer</title>
    <link rel="stylesheet" href="src/popup.css">
  </head>
  <body>
    <main class="popup">
      <header>
        <div>
          <h1>Smooth Surfer</h1>
          <p data-status>Ready</p>
        </div>
        <label class="switch-row compact" data-description="Turns every Smooth Surfer effect on or off.">
          <span>Enabled</span>
          <input type="checkbox" data-setting="enabled">
        </label>
      </header>

      <section data-site-section="youtube">
        <h2>YouTube</h2>
        <label class="switch-row" data-description="Desaturates YouTube thumbnails so they draw less attention.">
          <span>Gray thumbnails</span>
          <input type="checkbox" data-setting="youtubeGrayscaleThumbnails">
        </label>
        <label class="switch-row" data-description="Removes YouTube watch-page recommendations while leaving the home feed visible.">
          <span>Hide recommendations</span>
          <input type="checkbox" data-setting="youtubeHideRecommendations">
        </label>
        <label class="switch-row" data-description="Removes Shorts links and Shorts shelves from YouTube.">
          <span>Hide Shorts</span>
          <input type="checkbox" data-setting="youtubeHideShorts">
        </label>
        <label class="switch-row" data-description="Redirects away from YouTube Shorts pages if one opens.">
          <span>Block Shorts pages</span>
          <input type="checkbox" data-setting="youtubeBlockShorts">
        </label>
        <label class="switch-row" data-description="Removes YouTube Playables, games, and gaming shelves.">
          <span>Hide games</span>
          <input type="checkbox" data-setting="youtubeHideGames">
        </label>
        <label class="switch-row" data-description="Hides live chat panels on YouTube streams and premieres.">
          <span>Hide live chat</span>
          <input type="checkbox" data-setting="youtubeHideLiveChat">
        </label>
        <label class="switch-row" data-description="Turns YouTube autoplay off when the autoplay toggle is on.">
          <span>Disable autoplay</span>
          <input type="checkbox" data-setting="youtubeDisableAutoplay">
        </label>
        <label class="switch-row" data-description="Hides end-of-video cards and overlay prompts.">
          <span>Hide end screens</span>
          <input type="checkbox" data-setting="youtubeHideEndScreens">
        </label>
        <label class="switch-row" data-description="Hides views, likes, subscriber counts, and similar engagement counters.">
          <span>Hide engagement stats</span>
          <input type="checkbox" data-setting="youtubeHideEngagementStats">
        </label>
      </section>

      <section data-site-section="twitter">
        <h2>X / Twitter</h2>
        <label class="switch-row" data-description="Hides promoted posts in X/Twitter feeds.">
          <span>Remove feed ads</span>
          <input type="checkbox" data-setting="twitterHideAds">
        </label>
        <label class="switch-row" data-description="Requires an Anthropic key. Without one, content filtering stays off.">
          <span>Filter out content</span>
          <input type="checkbox" data-setting="twitterFilterContent">
        </label>
        <label class="switch-row" data-description="Hides trending-topic modules on X/Twitter.">
          <span>Hide trends</span>
          <input type="checkbox" data-setting="twitterHideTrends">
        </label>
        <label class="switch-row" data-description="Switches the X/Twitter home timeline from For You to Following when possible.">
          <span>Prefer Following</span>
          <input type="checkbox" data-setting="twitterEnforceFollowing">
        </label>
      </section>

      <section data-site-section="reddit">
        <h2>Reddit</h2>
        <label class="switch-row" data-description="Hides promoted posts in Reddit feeds.">
          <span>Remove feed ads</span>
          <input type="checkbox" data-setting="redditHideAds">
        </label>
        <label class="switch-row" data-description="Hides Reddit recommendation units such as suggested communities and because-you-visited posts.">
          <span>Hide recommendations</span>
          <input type="checkbox" data-setting="redditHideRecommendations">
        </label>
        <label class="switch-row" data-description="Requires an Anthropic key. Without one, content filtering stays off.">
          <span>Filter out content</span>
          <input type="checkbox" data-setting="redditFilterContent">
        </label>
      </section>

      <section data-site-section="substack">
        <h2>Substack</h2>
        <label class="switch-row" data-description="Hides Substack recommendation modules and network-growth prompts.">
          <span>Hide recommendations</span>
          <input type="checkbox" data-setting="substackHideRecommendations">
        </label>
        <label class="switch-row" data-description="Requires an Anthropic key. Without one, content filtering stays off.">
          <span>Filter out content</span>
          <input type="checkbox" data-setting="substackFilterContent">
        </label>
      </section>

      <section data-site-section="hacker-news">
        <h2>Hacker News</h2>
        <label class="switch-row" data-description="Requires an Anthropic key. Without one, story and comment filtering stays off.">
          <span>Filter stories/comments</span>
          <input type="checkbox" data-setting="hackerNewsFilterContent">
        </label>
        <label class="switch-row" data-description="Hides Hacker News story scores.">
          <span>Hide scores</span>
          <input type="checkbox" data-setting="hackerNewsHideScores">
        </label>
      </section>

      <section>
        <h2>Content filter</h2>
        <label class="field-row" data-api-key-row>
          <span>Anthropic key</span>
          <input type="password" data-secret="anthropicApiKey" placeholder="sk-ant-...">
        </label>
        <p class="notice" data-filter-key-status></p>
        <form class="phrase-form" data-phrase-form>
          <input type="text" data-phrase-input placeholder="Add filter criterion">
          <button type="submit">Add</button>
        </form>
        <div class="pills" data-phrase-list aria-live="polite"></div>
      </section>

      <section>
        <h2>Everywhere</h2>
        <label class="switch-row" data-description="Hides floating sticky video players outside work sites.">
          <span>Hide sticky videos</span>
          <input type="checkbox" data-setting="hideStickyVideoPlayers">
        </label>
        <label class="switch-row" data-description="Pauses after about eight screenfuls outside work sites until you choose Keep going.">
          <span>Pause deep scrolling</span>
          <input type="checkbox" data-setting="pauseDeepScrolling">
        </label>
        <label class="switch-row" data-description="Grayscales media in feed-like surfaces outside work sites.">
          <span>Gray distracting media</span>
          <input type="checkbox" data-setting="softenDistractingElements">
        </label>
      </section>
    </main>

    <script src="src/settings.js"></script>
    <script src="src/storage.js"></script>
    <script src="src/popup.js"></script>
  </body>
</html>
